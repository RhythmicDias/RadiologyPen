<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EEG Pen Toolbar</title>
    %sveltekit.head%
    <style>
      /* Must come AFTER %sveltekit.head% to override any injected base styles */
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        overflow: hidden;
      }
      /* Also zero-out SvelteKit's root mount div */
      body > div {
        background: transparent !important;
      }
    </style>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
